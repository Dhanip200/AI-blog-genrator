<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Blog Generator with TTS</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 2rem auto; padding: 1rem; background: #f4f6f8; color: #333; }
    h1 { text-align: center; color: #222; }
    form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgb(0 0 0 / 0.1); }
    textarea { width: 100%; height: 120px; font-size: 1rem; padding: 10px; border-radius: 6px; border: 1px solid #ccc; resize: vertical; }
    select, button { font-size: 1rem; padding: 8px 12px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; transition: background-color 0.3s ease; }
    button:hover { background-color: #0056b3; }
    #results { margin-top: 2rem; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 6px rgb(0 0 0 / 0.1); }
    #summary { white-space: pre-wrap; margin-bottom: 1rem; font-size: 1.1rem; line-height: 1.4; }
    #thoughts { font-style: italic; color: #555; margin-bottom: 1rem; }
    audio { width: 100%; outline: none; border-radius: 6px; margin-top: 10px; }
    label { font-weight: 600; }
  </style>
</head>
<body>
  <h1>AI Blog Generator with Text-to-Speech</h1>
  <form id="blogForm">
    <label for="query">Enter blog topic:</label><br />
    <textarea id="query" name="query" placeholder="Write your blog topic here..." required></textarea><br />

    <label for="language">Select language for blog & speech:</label><br />
    <select id="language" name="language">
      <option value="en" selected>English</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="zh-cn">Chinese (Simplified)</option>
      <option value="ja">Japanese</option>
      <option value="hi">Hindi</option>
      <!-- Add more languages if needed -->
    </select><br />

    <button type="submit">Generate Blog</button>
  </form>

  <div id="results" style="display:none;">
    <h2>Summary</h2>
    <div id="summary"></div>

    <h3>Thoughts</h3>
    <div id="thoughts"></div>

    <h3>Audio</h3>
    <audio id="audio-player" controls style="display:none;"></audio>
  </div>

  <script>
    const form = document.getElementById("blogForm");
    const resultsDiv = document.getElementById("results");
    const summaryDiv = document.getElementById("summary");
    const thoughtsDiv = document.getElementById("thoughts");
    const audioPlayer = document.getElementById("audio-player");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const query = document.getElementById("query").value.trim();
      const language = document.getElementById("language").value;

      if (!query) {
        alert("Please enter a blog topic.");
        return;
      }

      // Clear previous results
      resultsDiv.style.display = "none";
      summaryDiv.textContent = "Generating blog summary, please wait...";
      thoughtsDiv.textContent = "";
      audioPlayer.src = "";
      audioPlayer.style.display = "none";

      try {
        const response = await fetch("/generate_blog", {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: new URLSearchParams({ query, language }),
        });

        if (!response.ok) throw new Error("Failed to generate blog");

        const data = await response.json();

        summaryDiv.textContent = data.summary || "No summary returned.";
        if (Array.isArray(data.thoughts)) {
          thoughtsDiv.innerHTML = data.thoughts.join("<br>");
        } else {
          thoughtsDiv.textContent = data.thoughts || "";
        }

        if (data.audio_url) {
          audioPlayer.src = data.audio_url;
          audioPlayer.style.display = "block";
          // Don't autoplay to avoid browser block; user can play manually
        } else {
          audioPlayer.style.display = "none";
        }

        resultsDiv.style.display = "block";
      } catch (error) {
        summaryDiv.textContent = "Error: " + error.message;
        resultsDiv.style.display = "block";
      }
    });
  </script>
</body>
</html>
